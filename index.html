<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>The Triangle of Everything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="chart"></div>
  <div id="search-box">
    <button id="search-btn" title="Search objects (/)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    </button>
    <input type="text" id="search-input" placeholder="Search objects…" autocomplete="off" spellcheck="false">
    <div id="search-results"></div>
  </div>
  <div id="preset-bar">
    <button data-preset="all" class="active" title="Full view">All</button>
    <button data-preset="particle-physics" title="Quarks, leptons, bosons &amp; hadrons">Particle Physics</button>
    <button data-preset="chemistry" title="Atoms, molecules &amp; compounds">Chemistry</button>
    <button data-preset="biology" title="Cells, organisms &amp; ecosystems">Biology</button>
    <button data-preset="engineering" title="Human-built: chips to pyramids">Engineering</button>
    <button data-preset="geology" title="Moons, planets &amp; solar systems">Geology</button>
    <button data-preset="astrophysics" title="Stars, remnants &amp; nebulae">Astrophysics</button>
    <button data-preset="cosmology" title="Galaxies, clusters &amp; the observable universe">Cosmology</button>
  </div>
  <button id="sidebar-expand" title="Expand panel">&gt;&gt;</button>
  <div id="sidebar">
    <button id="sidebar-close" title="Collapse panel">&lt;&lt;</button>
    <div id="sidebar-intro">
      <h1 id="intro-title">
        <span class="title-line1">THE TRIANGLE OF</span>
        <span class="title-line2">EVERYTHING</span>
      </h1>
      <div id="intro-body"></div>
    </div>
    <div id="sidebar-object" style="display:none">
      <div id="sb-header">
        <span id="sb-dot"></span>
        <div>
          <h2 id="sb-name"></h2>
          <span id="sb-category"></span>
        </div>
      </div>
      <div id="sb-image">
        <svg viewBox="0 0 48 48" width="48" height="48" opacity="0.15">
          <rect x="4" y="8" width="40" height="32" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="16" cy="20" r="4" fill="currentColor"/>
          <polyline points="4,36 16,26 24,32 32,22 44,34" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>Image coming soon</span>
      </div>
      <div id="sb-stats"></div>
      <div id="sb-desc"></div>
      <div id="sb-links"></div>
    </div>
  </div>
  <div id="readout"></div>
  <div id="tooltip"></div>
  <div id="axis-tooltip"></div>
  <div id="controls">
    <button id="zoom-in" title="Zoom in">+</button>
    <button id="zoom-out" title="Zoom out">&minus;</button>
    <button id="zoom-reset" title="Reset view">&#x2299;</button>
  </div>
  <div id="scale-bar"></div>
  <div id="keyhint">scroll to zoom &middot; drag to pan &middot; click object to focus &middot; / to search</div>
  <button id="settings-btn" title="Settings">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <div id="settings-panel">
    <label class="setting-check">
      <input type="checkbox" id="set-bg" checked>
      <span class="checkmark"></span>
      Show background image
    </label>
    <label class="setting-check">
      <input type="checkbox" id="set-anim" checked>
      <span class="checkmark"></span>
      Show animations
    </label>
    <hr class="setting-divider">
    <label class="setting-range">
      <span class="setting-range-label">Noise</span>
      <input type="range" id="set-noise" min="0" max="100" value="35">
    </label>
  </div>
  <!-- Tour Guide -->
  <div id="tour-header" class="tour-hidden">
    <h2><span class="tour-title-line1">THE TRIANGLE OF</span><span class="tour-title-line2">EVERYTHING</span></h2>
    <p>Design and texts by Alex Van de Sande, based on a paper by Charles Lineweaver and Vihan Patel</p>
  </div>
  <div id="tour-box" class="tour-hidden">
    <button id="tour-close" title="Close tour">&times;</button>
    <div id="tour-content">
      <h3 id="tour-title"></h3>
      <p id="tour-text"></p>
    </div>
    <div id="tour-nav">
      <button id="tour-prev">&lt;</button>
      <button id="tour-next-label"></button>
    </div>
    <div id="tour-dots"></div>
  </div>
  <button id="tour-start-btn" class="tour-hidden">
    <span id="tour-start-label">Start the tour</span>
  </button>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
