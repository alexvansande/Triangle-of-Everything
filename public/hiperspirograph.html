<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiperspirograph</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: #1a1a1a;
    color: #ccc;
    margin: 0;
  }
  .layout { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  @media (min-width: 920px) {
    .layout { flex-direction: row; align-items: flex-start; gap: 24px; }
  }
  canvas { border: 1px solid #444; flex-shrink: 0; cursor: grab; }
  canvas.dragging { cursor: grabbing; }
  .controls {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 6px 12px;
    align-items: center;
    width: 360px;
  }
  .controls .sep { grid-column: 1 / -1; border-top: 1px solid #444; margin: 4px 0; }
  .controls .heading { grid-column: 1 / -1; font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 1px; margin-top: 2px; }
  input[type="range"] { width: 100%; }
  .value { text-align: right; font-variant-numeric: tabular-nums; min-width: 4ch; }
  .btn { padding: 8px; cursor: pointer; background: #333; color: #ccc; border: 1px solid #555; border-radius: 4px; font-size: 14px; }
  .btn:hover { background: #444; }
  .btn-row { grid-column: 1 / -1; display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }
  #resonance-display { grid-column: 1 / -1; padding: 8px 0; text-align: center; }
  .resonance-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .resonance-fill { height: 100%; border-radius: 3px; transition: width 0.2s, background 0.2s; }
  .presets { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 6px; }
  .preset-btn {
    padding: 4px 10px; cursor: pointer; background: #2a2a2a; color: #aaa;
    border: 1px solid #444; border-radius: 12px; font-size: 12px; white-space: nowrap;
  }
  .preset-btn:hover { background: #3a3a3a; color: #fff; }
  .dim-label {
    grid-column: 1 / -1; font-size: 12px; color: #666; font-style: italic; margin: -2px 0;
  }
  .axis-row { display: contents; }
  .axis-row.hidden { display: none; }
</style>
</head>
<body>

<div class="layout">
<canvas id="c" width="512" height="512" style="width:512px;height:512px"></canvas>

<div class="controls">
  <div id="resonance-display"></div>

  <div class="sep"></div>
  <div class="heading">Presets</div>
  <div class="presets" id="presets"></div>

  <div class="sep"></div>

  <label for="dims">Dimensions</label>
  <input type="range" id="dims" min="2" max="5" value="4" step="1">
  <span class="value" id="dimsv">4D</span>

  <label for="r">Inner r</label>
  <input type="range" id="r" min="5" max="90" value="40">
  <span class="value" id="rv">40</span>

  <div class="sep"></div>
  <div class="heading">Outer hypersphere</div>
  <div id="outerAxes"></div>

  <div class="sep"></div>
  <div class="heading">Inner hypersphere</div>
  <div id="innerAxes"></div>

  <div class="sep"></div>

  <label for="hueShift">Hue shift</label>
  <input type="range" id="hueShift" min="0" max="360" value="0">
  <span class="value" id="hueShiftv">0°</span>

  <label for="tipSize">Tip size</label>
  <input type="range" id="tipSize" min="0" max="80" value="0">
  <span class="value" id="tipSizev">0</span>

  <div id="ribbonControls" style="display:contents">
    <label for="ribbon" style="white-space:nowrap">
      <input type="checkbox" id="ribbon"> Ribbon
    </label>
    <span></span><span></span>

    <label for="ribbonSpin">Spin</label>
    <input type="range" id="ribbonSpin" min="1" max="40" value="5">
    <span class="value" id="ribbonSpinv">5</span>

    <label for="ribbonWobble">Wobble</label>
    <input type="range" id="ribbonWobble" min="0" max="40" value="3">
    <span class="value" id="ribbonWobblev">3</span>
  </div>

  <label for="loops">Loops</label>
  <input type="range" id="loops" min="1" max="60" value="30">
  <span class="value" id="loopsv">30</span>

  <div id="view3d" style="display:contents">
    <label for="spinXZ">Spin XZ</label>
    <input type="range" id="spinXZ" min="0" max="360" value="0">
    <span class="value" id="spinXZv">0°</span>

    <label for="spinYZ">Tilt YZ</label>
    <input type="range" id="spinYZ" min="0" max="90" value="30">
    <span class="value" id="spinYZv">30°</span>
  </div>

  <div id="view4d" style="display:contents">
    <label for="spinXW">Spin XW</label>
    <input type="range" id="spinXW" min="0" max="360" value="0">
    <span class="value" id="spinXWv">0°</span>
  </div>

  <div id="view5d" style="display:contents">
    <label for="spinXV">Spin XV</label>
    <input type="range" id="spinXV" min="0" max="360" value="0">
    <span class="value" id="spinXVv">0°</span>

    <label for="slicePos">Slice pos</label>
    <input type="range" id="slicePos" min="-100" max="100" value="0">
    <span class="value" id="slicePosv">0</span>

    <label for="sliceWidth">Slice width</label>
    <input type="range" id="sliceWidth" min="1" max="100" value="40">
    <span class="value" id="sliceWidthv">40</span>
  </div>

  <div class="sep"></div>
  <div class="btn-row">
    <button class="btn" id="harmonize">✨ Harmonize</button>
    <button class="btn" id="randomize">🎲 Random</button>
    <button class="btn" id="randomNice">🎯 Lucky</button>
  </div>
  <div class="btn-row">
    <button class="btn" id="download">💾 PNG</button>
    <button class="btn" id="copyLink">🔗 Copy Link</button>
  </div>
</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Dynamic axis sliders ---
const MAX_AXES = 4; // max N-1 for 5D
const outerAxesEl = document.getElementById('outerAxes');
const innerAxesEl = document.getElementById('innerAxes');

function createAxisSliders(container, prefix, maxVal) {
  container.innerHTML = '';
  container.style.display = 'contents';
  for (let i = 1; i <= MAX_AXES; i++) {
    const id = `${prefix}${i}`;
    const row = document.createElement('div');
    row.className = 'axis-row';
    row.dataset.axis = i;
    row.innerHTML = `
      <label for="${id}">Axis ${i}</label>
      <input type="range" id="${id}" min="1" max="${maxVal}" value="${i * 2 + 1}">
      <span class="value" id="${id}v">${i * 2 + 1}</span>
    `;
    container.appendChild(row);
  }
}

createAxisSliders(outerAxesEl, 'o', 20);
createAxisSliders(innerAxesEl, 'i', 30);

// Set nice defaults
const defaultOuter = [3, 2, 5, 7];
const defaultInner = [7, 5, 11, 3];
defaultOuter.forEach((v, i) => { const el = document.getElementById(`o${i+1}`); if (el) el.value = v; });
defaultInner.forEach((v, i) => { const el = document.getElementById(`i${i+1}`); if (el) el.value = v; });

function updateAxisVisibility() {
  const dims = +document.getElementById('dims').value;
  const numAxes = dims - 1;

  document.getElementById('dimsv').textContent = dims + 'D';

  // Show/hide axis sliders
  for (let i = 1; i <= MAX_AXES; i++) {
    const show = i <= numAxes;
    outerAxesEl.querySelectorAll(`[data-axis="${i}"]`).forEach(el => el.classList.toggle('hidden', !show));
    innerAxesEl.querySelectorAll(`[data-axis="${i}"]`).forEach(el => el.classList.toggle('hidden', !show));
  }

  // View controls: show based on dimension
  const show = (id, vis) => document.getElementById(id).querySelectorAll('label, input, span').forEach(el => el.style.display = vis ? '' : 'none');
  show('view3d', dims >= 3);
  show('view4d', dims >= 4);
  show('view5d', dims >= 5);
}

// --- Hypersphere point ---
function hyperspherePoint(freqs, t, R) {
  const N = freqs.length + 1;
  const coords = [];
  let sinProd = R;
  for (let i = 0; i < freqs.length; i++) {
    coords.push(sinProd * Math.cos(freqs[i] * t));
    sinProd *= Math.sin(freqs[i] * t);
  }
  coords.push(sinProd);
  return coords;
}

// --- Math helpers ---
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }
function lcm(a, b) { return a && b ? Math.abs(a * b) / gcd(a, b) : 0; }
function lcmArr(arr) { return arr.reduce((a, b) => lcm(a, b), 1); }

function analyzeResonance(freqs) {
  const period = lcmArr(freqs);
  let pairScore = 0, pairs = 0;
  for (let i = 0; i < freqs.length; i++) {
    for (let j = i + 1; j < freqs.length; j++) {
      pairScore += gcd(freqs[i], freqs[j]) / Math.max(freqs[i], freqs[j]);
      pairs++;
    }
  }
  pairScore /= pairs || 1;
  const periodScore = 1 - Math.min(1, Math.log(period) / Math.log(500000));
  const unique = new Set(freqs).size;
  const coherence = 1 - (unique - 1) / Math.max(1, freqs.length - 1);
  const overallGcd = freqs.reduce((a, b) => gcd(a, b));
  const score = pairScore * 0.4 + periodScore * 0.3 + coherence * 0.2 + Math.min(1, overallGcd / 3) * 0.1;

  let category, emoji;
  if (score > 0.7) { category = 'Crystalline'; emoji = '💎'; }
  else if (score > 0.5) { category = 'Harmonic'; emoji = '🎵'; }
  else if (score > 0.35) { category = 'Flowing'; emoji = '🌊'; }
  else if (score > 0.2) { category = 'Tangled'; emoji = '🪢'; }
  else { category = 'Chaotic'; emoji = '🌀'; }

  const ratioDescs = [];
  if (overallGcd > 1) ratioDescs.push(`global ${overallGcd}-fold`);
  return { score, period, category, emoji, ratioDescs };
}

function updateResonanceDisplay() {
  const dims = +document.getElementById('dims').value;
  const numAxes = dims - 1;
  const freqs = [];
  for (let i = 1; i <= numAxes; i++) {
    freqs.push(+document.getElementById(`o${i}`).value);
    freqs.push(+document.getElementById(`i${i}`).value);
  }
  const res = analyzeResonance(freqs);
  const pct = Math.round(res.score * 100);
  const hue = res.score * 120;
  const oRatios = Array.from({length: numAxes}, (_, i) => document.getElementById(`o${i+1}`).value).join(':');
  const iRatios = Array.from({length: numAxes}, (_, i) => document.getElementById(`i${i+1}`).value).join(':');
  const desc = res.ratioDescs.length ? ` · ${res.ratioDescs.join(', ')}` : '';

  document.getElementById('resonance-display').innerHTML =
    `<div style="font-size:13px">${res.emoji} <strong>${res.category}</strong> <span style="color:#888">(${pct}%)${desc}</span></div>` +
    `<div style="font-size:11px;color:#666;margin-top:2px">Period: ${res.period.toLocaleString()} · ${oRatios} + ${iRatios}</div>` +
    `<div class="resonance-bar"><div class="resonance-fill" style="width:${pct}%;background:hsl(${hue},70%,50%)"></div></div>`;
}

// --- Drawing ---
function draw() {
  const dims = +document.getElementById('dims').value;
  const numAxes = dims - 1;
  const rRatio = +document.getElementById('r').value / 100;
  const tipSize = +document.getElementById('tipSize').value / 100; // 0..0.8
  const ribbonOn = document.getElementById('ribbon').checked;
  const ribbonSpin = +document.getElementById('ribbonSpin').value;
  const ribbonWobble = +document.getElementById('ribbonWobble').value;
  const loops = +document.getElementById('loops').value;
  const spinXZDeg = +document.getElementById('spinXZ').value;
  const spinYZDeg = +document.getElementById('spinYZ').value;
  const spinXWDeg = +document.getElementById('spinXW').value;
  const spinXVDeg = +document.getElementById('spinXV').value;
  const hueShift = +document.getElementById('hueShift').value;
  const slicePos = +document.getElementById('slicePos').value / 100; // -1..1
  const sliceWidth = +document.getElementById('sliceWidth').value / 100; // 0.01..1

  const outerFreqs = [], innerFreqs = [];
  for (let i = 1; i <= numAxes; i++) {
    outerFreqs.push(+document.getElementById(`o${i}`).value);
    innerFreqs.push(+document.getElementById(`i${i}`).value);
  }

  // Update displays
  document.getElementById('rv').textContent = Math.round(rRatio * 100);
  document.getElementById('tipSizev').textContent = Math.round(tipSize * 100);
  document.getElementById('ribbonSpinv').textContent = ribbonSpin;
  document.getElementById('ribbonWobblev').textContent = ribbonWobble;
  document.getElementById('loopsv').textContent = loops;
  document.getElementById('spinXZv').textContent = spinXZDeg + '\u00b0';
  document.getElementById('spinYZv').textContent = spinYZDeg + '\u00b0';
  document.getElementById('spinXWv').textContent = spinXWDeg + '\u00b0';
  document.getElementById('spinXVv').textContent = spinXVDeg + '\u00b0';
  document.getElementById('hueShiftv').textContent = hueShift + '\u00b0';
  document.getElementById('slicePosv').textContent = Math.round(slicePos * 100);
  document.getElementById('sliceWidthv').textContent = Math.round(sliceWidth * 100);
  for (let i = 1; i <= numAxes; i++) {
    document.getElementById(`o${i}v`).textContent = outerFreqs[i-1];
    document.getElementById(`i${i}v`).textContent = innerFreqs[i-1];
  }
  updateResonanceDisplay();

  const aXZ = spinXZDeg * Math.PI / 180;
  const aYZ = spinYZDeg * Math.PI / 180;
  const aXW = spinXWDeg * Math.PI / 180;
  const aXV = spinXVDeg * Math.PI / 180;
  const R = 1 - rRatio;
  const r = rRatio;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 512, 512);

  const cxc = 256, cyc = 256;
  const scale = 512 * 0.43;

  const maxFreq = Math.max(...outerFreqs, ...innerFreqs);
  const steps = loops * Math.max(500, maxFreq * 80);
  const points = [];

  // Precompute rotation trig
  const cosXZ = Math.cos(aXZ), sinXZ = Math.sin(aXZ);
  const cosYZ = Math.cos(aYZ), sinYZ = Math.sin(aYZ);
  const cosXW = Math.cos(aXW), sinXW = Math.sin(aXW);
  const cosXV = Math.cos(aXV), sinXV = Math.sin(aXV);

  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * loops * Math.PI * 2;

    const outerCoords = hyperspherePoint(outerFreqs, t, R);
    const innerCoords = hyperspherePoint(innerFreqs, t, r);

    // Sum in N dimensions
    const coords = outerCoords.map((v, idx) => v + innerCoords[idx]);

    // Extract dimensions: x, y always; z if 3D+; w if 4D+; v if 5D
    let x = coords[0] || 0;
    let y = coords[1] || 0;
    let z = coords[2] || 0;
    let w = coords[3] || 0; // hue
    let v = coords[4] || 0; // slice

    // View rotations — applied in order: XV, XW, XZ, YZ
    if (dims >= 5) {
      // Rotate in XV plane (mixes x ↔ v)
      const rx5 = x * cosXV + v * sinXV;
      const rv5 = -x * sinXV + v * cosXV;
      x = rx5; v = rv5;
    }
    if (dims >= 4) {
      // Rotate in XW plane (mixes x ↔ w)
      const rx4 = x * cosXW + w * sinXW;
      const rw4 = -x * sinXW + w * cosXW;
      x = rx4; w = rw4;
    }
    if (dims >= 3) {
      // Rotate in XZ plane (spin)
      let rx = x * cosXZ + z * sinXZ;
      let rz = -x * sinXZ + z * cosXZ;
      x = rx; z = rz;

      // Rotate in YZ plane (tilt)
      let ry = y * cosYZ - z * sinYZ;
      rz = y * sinYZ + z * cosYZ;
      y = ry; z = rz;
    }

    // Perspective (3D+)
    let px, py, pScale = 1;
    if (dims >= 3) {
      const perspD = 4;
      pScale = perspD / (perspD - z);
      px = cxc + x * scale * pScale;
      py = cyc + y * scale * pScale;
    } else {
      px = cxc + x * scale;
      py = cyc + y * scale;
    }

    // Ribbon orientation: two twist axes create a rotating diameter
    const t_val = (i / steps) * loops * Math.PI * 2;
    const rAngle = ribbonSpin * t_val; // spin around travel direction
    const rTilt = ribbonWobble * t_val; // wobble perpendicular

    // Ribbon offset in screen space: diameter endpoints
    // Spin rotates in the screen XY plane, wobble tilts it into Z (foreshortened)
    const tipR = tipSize * scale * pScale * 0.15;
    const ribbonDx = tipR * Math.cos(rAngle);
    const ribbonDy = tipR * Math.sin(rAngle) * Math.cos(rTilt);

    points.push({ px, py, z, w, v, pScale, ribbonDx, ribbonDy });
  }

  // Normalize ranges
  let zMin = Infinity, zMax = -Infinity, wMin = Infinity, wMax = -Infinity;
  let vMin = Infinity, vMax = -Infinity;
  for (const p of points) {
    zMin = Math.min(zMin, p.z); zMax = Math.max(zMax, p.z);
    wMin = Math.min(wMin, p.w); wMax = Math.max(wMax, p.w);
    vMin = Math.min(vMin, p.v); vMax = Math.max(vMax, p.v);
  }
  const zRange = zMax - zMin || 1;
  const wRange = wMax - wMin || 1;
  const vRange = vMax - vMin || 1;

  // Build segments
  const segments = [];
  for (let i = 1; i < points.length; i++) {
    const avgZ = (points[i - 1].z + points[i].z) / 2;
    const avgW = (points[i - 1].w + points[i].w) / 2;
    const avgV = (points[i - 1].v + points[i].v) / 2;

    const depth = dims >= 3 ? (avgZ - zMin) / zRange : 1;
    const hue = dims >= 4 ? (((avgW - wMin) / wRange) * 360 + hueShift) % 360 : 0;

    // 5D slice: triangle falloff centered at slicePos
    let slice = 1;
    if (dims >= 5) {
      const vNorm = (avgV - vMin) / vRange * 2 - 1; // -1..1
      const dist = Math.abs(vNorm - slicePos);
      slice = Math.max(0, 1 - dist / Math.max(0.01, sliceWidth));
    }

    const avgPScale = (points[i - 1].pScale + points[i].pScale) / 2;
    const p0 = points[i - 1], p1 = points[i];
    segments.push({
      x0: p0.px, y0: p0.py,
      x1: p1.px, y1: p1.py,
      // Ribbon quad corners
      rdx0: p0.ribbonDx, rdy0: p0.ribbonDy,
      rdx1: p1.ribbonDx, rdy1: p1.ribbonDy,
      depth, hue, slice, pScale: avgPScale
    });
  }

  if (dims >= 3) segments.sort((a, b) => a.depth - b.depth);

  // Draw to offscreen canvas
  const off = document.createElement('canvas');
  off.width = 512; off.height = 512;
  const oc = off.getContext('2d');

  // Scale opacity by loop density: fewer loops = full opacity, many loops = more transparent
  // This prevents overdraw from washing out the depth/slice effects
  const loopAlpha = Math.min(1, 8 / loops);

  for (const seg of segments) {
    const d = seg.depth;
    const sl = seg.slice * loopAlpha;

    if (sl < 0.01) continue; // skip fully invisible

    let hueStr;
    if (dims >= 4) {
      const lightness = Math.round(15 + 70 * d * d);
      const sat = 80 + 20 * d;
      hueStr = `hsla(${seg.hue}, ${sat}%, ${lightness}%, ${sl})`;
    } else if (dims >= 3) {
      const brightness = Math.round(30 + 225 * d * d);
      hueStr = `rgba(${brightness},${brightness},${brightness},${sl})`;
    } else {
      hueStr = `rgba(255,255,255,${sl})`;
    }

    if (ribbonOn && tipSize > 0) {
      // Ribbon thickness = depth-based line width
      const thickness = Math.max(1.2, 0.5 + 3.5 * d * d);
      // Draw ribbon quad with stroke for thickness
      oc.fillStyle = hueStr;
      oc.strokeStyle = hueStr;
      oc.lineWidth = thickness;
      oc.lineJoin = 'round';
      oc.beginPath();
      oc.moveTo(seg.x0 + seg.rdx0, seg.y0 + seg.rdy0);
      oc.lineTo(seg.x1 + seg.rdx1, seg.y1 + seg.rdy1);
      oc.lineTo(seg.x1 - seg.rdx1, seg.y1 - seg.rdy1);
      oc.lineTo(seg.x0 - seg.rdx0, seg.y0 - seg.rdy0);
      oc.closePath();
      oc.fill();
      oc.stroke();
    } else {
      // Round stroke mode
      const tipRadius = tipSize * scale * seg.pScale * 0.15;
      const lineW = Math.max(1.2, (0.5 + 3.5 * d * d) + tipRadius * 2);
      oc.strokeStyle = hueStr;
      oc.lineWidth = lineW;
      oc.lineCap = 'round';
      oc.beginPath();
      oc.moveTo(seg.x0, seg.y0);
      oc.lineTo(seg.x1, seg.y1);
      oc.stroke();
    }
  }

  // Glow + sharp
  ctx.filter = 'blur(6px) brightness(1.5)';
  ctx.globalAlpha = 0.5;
  ctx.drawImage(off, 0, 0);
  ctx.filter = 'blur(2px)';
  ctx.globalAlpha = 0.3;
  ctx.drawImage(off, 0, 0);
  ctx.filter = 'none';
  ctx.globalAlpha = 1;
  ctx.drawImage(off, 0, 0);
}

// --- Presets ---
const PRESETS = [
  // 2D classics
  { name: 'Rosette', dims: 2, r: 30, axes: [[5], [13]], loops: 30, vt: 0, vs: 0 },
  { name: 'Star', dims: 2, r: 20, axes: [[3], [8]], loops: 20, vt: 0, vs: 0 },
  // 3D
  { name: 'Knot', dims: 3, r: 75, axes: [[3, 2], [7, 5]], loops: 30, vt: 40, vs: 30 },
  { name: 'Shell', dims: 3, r: 15, axes: [[2, 5], [10, 15]], loops: 35, vt: 35, vs: 60 },
  // 4D
  { name: 'Starfish', dims: 4, r: 15, axes: [[5, 5, 2], [10, 2, 10]], loops: 25, vt: 30, vs: 0 },
  { name: 'Tangle', dims: 4, r: 80, axes: [[3, 2, 1], [12, 8, 4]], loops: 30, vt: 25, vs: 60 },
  { name: 'Nebula', dims: 4, r: 85, axes: [[1, 2, 3], [5, 7, 11]], loops: 45, vt: 35, vs: 90 },
  { name: 'Galaxy', dims: 4, r: 75, axes: [[2, 3, 5], [4, 6, 10]], loops: 40, vt: 50, vs: 120 },
  // 5D
  { name: 'Ghost', dims: 5, r: 80, axes: [[2, 3, 5, 7], [6, 9, 15, 3]], loops: 40, vt: 40, vs: 45 },
  { name: 'Strands', dims: 5, r: 15, axes: [[3, 3, 3, 2], [9, 9, 9, 6]], loops: 30, vt: 35, vs: 0 },
  { name: 'Vapor', dims: 5, r: 70, axes: [[2, 4, 6, 3], [8, 12, 4, 9]], loops: 45, vt: 50, vs: 90 },
];

function applyPreset(p) {
  document.getElementById('dims').value = p.dims;
  document.getElementById('r').value = p.r;
  document.getElementById('loops').value = p.loops;
  document.getElementById('spinYZ').value = p.vt || 30;
  document.getElementById('spinXZ').value = p.vs || 0;
  document.getElementById('spinXW').value = p.vw || 0;
  document.getElementById('spinXV').value = p.vv || 0;
  for (let i = 0; i < MAX_AXES; i++) {
    const oEl = document.getElementById(`o${i+1}`);
    const iEl = document.getElementById(`i${i+1}`);
    if (oEl) oEl.value = p.axes[0][i] || 3;
    if (iEl) iEl.value = p.axes[1][i] || 5;
  }
  updateAxisVisibility();
  draw();
}

const presetsEl = document.getElementById('presets');
PRESETS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = `${p.name} (${p.dims}D)`;
  btn.addEventListener('click', () => applyPreset(p));
  presetsEl.appendChild(btn);
});

// --- Events ---
document.querySelectorAll('.controls input[type="range"]').forEach(el =>
  el.addEventListener('input', () => {
    if (el.id === 'dims') updateAxisVisibility();
    draw();
  })
);
document.getElementById('ribbon').addEventListener('change', draw);

function randInt(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }

document.getElementById('randomize').addEventListener('click', () => {
  const dims = +document.getElementById('dims').value;
  const numAxes = dims - 1;
  document.getElementById('r').value = randInt(10, 90);
  for (let i = 1; i <= numAxes; i++) {
    document.getElementById(`o${i}`).value = randInt(1, 15);
    document.getElementById(`i${i}`).value = randInt(1, 25);
  }
  document.getElementById('loops').value = randInt(10, 50);
  document.getElementById('spinYZ').value = randInt(10, 70);
  document.getElementById('spinXZ').value = randInt(0, 360);
  if (dims >= 4) document.getElementById('spinXW').value = randInt(0, 360);
  if (dims >= 5) document.getElementById('spinXV').value = randInt(0, 360);
  draw();
});

document.getElementById('randomNice').addEventListener('click', () => {
  const dims = +document.getElementById('dims').value;
  const numAxes = dims - 1;
  const bases = [2, 3, 4, 5, 6];
  const base = bases[randInt(0, bases.length - 1)];
  const mults = [1, 2, 3, 4, 5, 6, 7, 8];
  const pick = (max) => Math.min(max, Math.max(1, base * mults[randInt(0, mults.length - 1)]));

  const rVal = Math.random() < 0.5 ? randInt(8, 25) : randInt(65, 88);
  document.getElementById('r').value = rVal;
  for (let i = 1; i <= numAxes; i++) {
    document.getElementById(`o${i}`).value = pick(20);
    document.getElementById(`i${i}`).value = pick(30);
  }
  document.getElementById('loops').value = randInt(15, 45);
  document.getElementById('spinYZ').value = randInt(15, 65);
  document.getElementById('spinXZ').value = randInt(0, 360);
  if (dims >= 4) document.getElementById('spinXW').value = randInt(0, 360);
  if (dims >= 5) document.getElementById('spinXV').value = randInt(0, 360);
  draw();
});

document.getElementById('harmonize').addEventListener('click', () => {
  const dims = +document.getElementById('dims').value;
  const numAxes = dims - 1;
  const ids = [];
  for (let i = 1; i <= numAxes; i++) { ids.push(`o${i}`); ids.push(`i${i}`); }
  const vals = ids.map(id => +document.getElementById(id).value);

  let bestScore = -1, bestVals = vals;
  for (const base of [1, 2, 3, 4, 5, 6]) {
    const snapped = vals.map(v => Math.max(1, Math.round(v / base) * base || base));
    const res = analyzeResonance(snapped);
    if (res.score > bestScore) { bestScore = res.score; bestVals = snapped; }
  }
  ids.forEach((id, i) => document.getElementById(id).value = bestVals[i]);
  draw();
});

document.getElementById('download').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'hyperspirograph.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

document.getElementById('copyLink').addEventListener('click', () => {
  const btn = document.getElementById('copyLink');
  navigator.clipboard.writeText(location.href).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '🔗 Copy Link', 2000);
  });
});

// --- Canvas drag-to-rotate ---
let dragState = null;
const SENSITIVITY = 0.7;

function wrapDeg(v, min, max) {
  const range = max - min;
  return ((v - min) % range + range) % range + min;
}

function clampDeg(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function startDrag(x, y, e) {
  dragState = {
    startX: x, startY: y,
    startXZ: +document.getElementById('spinXZ').value,
    startYZ: +document.getElementById('spinYZ').value,
    startXW: +document.getElementById('spinXW').value,
    startXV: +document.getElementById('spinXV').value,
    shift: e.shiftKey,
    ctrl: e.ctrlKey || e.metaKey,
  };
  canvas.classList.add('dragging');
}

function moveDrag(x, y) {
  if (!dragState) return;
  const dims = +document.getElementById('dims').value;
  const dx = (x - dragState.startX) * SENSITIVITY;
  const dy = (y - dragState.startY) * SENSITIVITY;

  if (dragState.ctrl && dims >= 5) {
    // Ctrl+drag → Spin XV
    document.getElementById('spinXV').value = wrapDeg(dragState.startXV + dx, 0, 360);
  } else if (dragState.shift && dims >= 4) {
    // Shift+drag → Spin XW
    document.getElementById('spinXW').value = wrapDeg(dragState.startXW + dx, 0, 360);
  } else if (dims >= 3) {
    // Normal drag → Spin XZ + Tilt YZ
    document.getElementById('spinXZ').value = wrapDeg(dragState.startXZ + dx, 0, 360);
    document.getElementById('spinYZ').value = clampDeg(dragState.startYZ - dy, 0, 90);
  }
  draw();
}

function endDrag() {
  dragState = null;
  canvas.classList.remove('dragging');
}

// Mouse events
canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  startDrag(e.clientX, e.clientY, e);
});
window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
window.addEventListener('mouseup', endDrag);
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Touch events
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  startDrag(t.clientX, t.clientY, e);
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  if (!dragState) return;
  const t = e.touches[0];
  moveDrag(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('touchend', endDrag);

// --- URL state encoding/decoding ---
// Pack all params into a compact string: values joined by dots, base36 where helpful
function getState() {
  const dims = +document.getElementById('dims').value;
  const numAxes = dims - 1;
  const vals = [
    dims,
    +document.getElementById('r').value,
    +document.getElementById('tipSize').value,
    document.getElementById('ribbon').checked ? 1 : 0,
    +document.getElementById('ribbonSpin').value,
    +document.getElementById('ribbonWobble').value,
    +document.getElementById('loops').value,
    +document.getElementById('spinXZ').value,
    +document.getElementById('spinYZ').value,
    +document.getElementById('spinXW').value,
    +document.getElementById('spinXV').value,
    +document.getElementById('slicePos').value,
    +document.getElementById('sliceWidth').value,
    +document.getElementById('hueShift').value,
  ];
  for (let i = 1; i <= numAxes; i++) vals.push(+document.getElementById(`o${i}`).value);
  for (let i = 1; i <= numAxes; i++) vals.push(+document.getElementById(`i${i}`).value);
  return vals.join('.');
}

function applyState(str) {
  const v = str.split('.').map(Number);
  if (v.length < 13) return false;
  const dims = v[0];
  if (dims < 2 || dims > 5) return false;
  document.getElementById('dims').value = dims;
  document.getElementById('r').value = v[1];
  document.getElementById('tipSize').value = v[2];
  document.getElementById('ribbon').checked = !!v[3];
  document.getElementById('ribbonSpin').value = v[4];
  document.getElementById('ribbonWobble').value = v[5];
  document.getElementById('loops').value = v[6];
  document.getElementById('spinXZ').value = v[7];
  document.getElementById('spinYZ').value = v[8];
  document.getElementById('spinXW').value = v[9];
  document.getElementById('spinXV').value = v[10];
  document.getElementById('slicePos').value = v[11];
  document.getElementById('sliceWidth').value = v[12];
  document.getElementById('hueShift').value = v[13] || 0;
  const numAxes = dims - 1;
  let idx = 14;
  for (let i = 1; i <= numAxes; i++) {
    const el = document.getElementById(`o${i}`);
    if (el && idx < v.length) el.value = v[idx++];
  }
  for (let i = 1; i <= numAxes; i++) {
    const el = document.getElementById(`i${i}`);
    if (el && idx < v.length) el.value = v[idx++];
  }
  updateAxisVisibility();
  return true;
}

function pushState() {
  const hash = getState();
  if (location.hash !== '#' + hash) {
    history.replaceState(null, '', '#' + hash);
  }
}

// Update URL on every draw
const origDraw = draw;
draw = function() {
  origDraw();
  pushState();
};

// Load from URL on init
function loadFromHash() {
  const hash = location.hash.slice(1);
  if (hash && applyState(hash)) {
    origDraw();
  }
}

window.addEventListener('hashchange', loadFromHash);

// Init
updateAxisVisibility();
if (location.hash.length > 1) {
  loadFromHash();
} else {
  draw();
}
</script>
